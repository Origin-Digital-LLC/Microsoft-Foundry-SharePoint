name: CMFUG Frontend Build
run-name: CMFUG Frontend Build [${{ github.run_id }}]

on:
  pull_request

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest  
    
    steps:    
      - name: Checkout Branch
        uses: actions/checkout@v4                

      - name: Run NPM Commands
        run: |
          cd ./src/frontend;
          
          npm install;
          npm run build;        
